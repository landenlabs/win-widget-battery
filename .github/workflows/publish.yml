name: Build, Sign, and Publish 3 Release Variants

on:
  push:
    tags:
      - 'v*'

jobs:
  publish-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    env:
      CODE_SIGN_PFX_BASE64: ${{ secrets.CODE_SIGN_PFX_BASE64 }}
      CODE_SIGN_PASSWORD: ${{ secrets.CODE_SIGN_PASSWORD }}
      TIMESTAMP_URL: http://timestamp.digicert.com

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore Dependencies
        run: dotnet restore

      # -----------------------------------------------------------------
      # 1. FLAVOR 1: ZERO-DEPENDENCY PORTABLE VARIANT (Heavy ~68MB unpack)
      # -----------------------------------------------------------------
      - name: Publish Self-Contained (x64)
        shell: pwsh
        run: |
          dotnet publish WinWidgetBattery.csproj -c Release `
            -r win-x64 `
            --self-contained true `
            /p:PublishSingleFile=true `
            /p:DebugType=none `
            /p:DebugSymbols=false `
            -o ./artifacts/self-contained

      # -----------------------------------------------------------------
      # 2. FLAVOR 2 & 3: FRAMEWORK-DEPENDENT BASE WORKER (~23.7MB Uncompressed)
      # -----------------------------------------------------------------
      - name: Publish Framework-Dependent (x64)
        shell: pwsh
        run: |
          dotnet publish WinWidgetBattery.csproj -c Release `
            -r win-x64 `
            --self-contained false `
            /p:PublishSingleFile=true `
            /p:DebugType=none `
            /p:DebugSymbols=false `
            -o ./artifacts/lightweight-x64

      # -----------------------------------------------------------------
      # 3. CODE SIGNING (Applies to all generated .exes if certificate exists)
      # -----------------------------------------------------------------
      - name: Sign Executables
        if: ${{ env.CODE_SIGN_PFX_BASE64 != '' }}
        shell: pwsh
        run: |
          $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\signtool.exe" -ErrorAction SilentlyContinue |
            Sort-Object FullName -Descending | Select-Object -First 1
          if (-not $signtool) { throw "signtool.exe not found on the runner." }

          $pfx = Join-Path $env:RUNNER_TEMP "codesign.pfx"
          [IO.File]::WriteAllBytes($pfx, [Convert]::FromBase64String($env:CODE_SIGN_PFX_BASE64))

          try {
            Get-ChildItem "./artifacts/**/*.exe" | ForEach-Object {
              Write-Host "Signing: $($_.FullName)"
              & $signtool.FullName sign /fd SHA256 /f $pfx /p $env:CODE_SIGN_PASSWORD `
                /tr $env:TIMESTAMP_URL /td SHA256 "$($_.FullName)"
              if ($LASTEXITCODE -ne 0) { throw "signtool sign failed on $($_.Name) (exit $LASTEXITCODE)." }
              
              $sig = Get-AuthenticodeSignature "$($_.FullName)"
              Write-Host "Signature status for $($_.Name): $($sig.Status)"
              if ($sig.Status -ne 'Valid') { throw "Post-sign verification failed for $($_.Name): $($sig.Status)" }
            }
          }
          finally {
            Remove-Item $pfx -Force -ErrorAction SilentlyContinue
          }

      # -----------------------------------------------------------------
      # 4. PACKAGING & ARCHIVING (Creating the ~6MB and ~25MB zip files)
      # -----------------------------------------------------------------
      - name: Package Archives
        shell: pwsh
        run: |
          # Flavor 1: Zip the heavy self-contained build folder (~25MB zipped download)
          Compress-Archive -Path ./artifacts/self-contained/*.exe -DestinationPath ./artifacts/WinWidgetBattery-Portable.zip

          # Flavor 3: Zip the lightweight build folder (Yields your true original ~6MB zipped download package)
          Compress-Archive -Path ./artifacts/lightweight-x64/*.exe -DestinationPath ./artifacts/WinWidgetBattery-Lightweight.zip

      - name: Upload Workflow Artifacts (30-day retention)
        uses: actions/upload-artifact@v4
        with:
          name: Production-Build-Packages
          path: |
            ./artifacts/WinWidgetBattery-Portable.zip
            ./artifacts/lightweight-x64/WinWidgetBattery.exe
            ./artifacts/WinWidgetBattery-Lightweight.zip
          retention-days: 30

      # -----------------------------------------------------------------
      # 5. CREATE GITHUB RELEASE WITH ALL 3 FLAVORS
      # -----------------------------------------------------------------
      - name: Create GitHub Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            ## Available Build Variants
            
            * 📦 **WinWidgetBattery-Portable.zip** (~25 MB download / ~68 MB extracted): Fully self-contained. Zero dependencies required. Extract the executable and run anywhere.
            * ⚙️ **WinWidgetBattery.exe** (~23.7 MB raw file): Framework-dependent x64 standalone executable. No extraction required, runs natively on machines with desktop runtimes.
            * 🪶 **WinWidgetBattery-Lightweight.zip** (~6 MB download / ~23.7 MB extracted): Ultra-compact compression footprint package. Requires the **.NET 10 Desktop Runtime** to be installed on your machine.
          draft: false
          prerelease: false
          files: |
            ./artifacts/WinWidgetBattery-Portable.zip
            ./artifacts/lightweight-x64/WinWidgetBattery.exe
            ./artifacts/WinWidgetBattery-Lightweight.zip
            