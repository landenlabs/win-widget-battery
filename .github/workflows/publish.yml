name: Build, Sign, and Publish Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write

    env:
      CODE_SIGN_PFX_BASE64: ${{ secrets.CODE_SIGN_PFX_BASE64 }}
      CODE_SIGN_PASSWORD: ${{ secrets.CODE_SIGN_PASSWORD }}
      TIMESTAMP_URL: http://timestamp.digicert.com

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore Dependencies
        run: dotnet restore

      - name: Publish Framework-Dependent Single File
        shell: pwsh
        run: |
          dotnet publish WinWidgetBattery.csproj -c Release `
            -r win-x64 `
            --self-contained false `
            /p:PublishSingleFile=true `
            /p:DebugType=none `
            /p:DebugSymbols=false `
            -o ./publish

      - name: Sign Executable
        if: ${{ env.CODE_SIGN_PFX_BASE64 != '' }}
        shell: pwsh
        run: |
          # Dynamically grab the compiled .exe inside the publish folder
          $exe = Get-ChildItem "./publish/*.exe" | Select-Object -First 1 -ExpandProperty FullName
          if (-not $exe) { throw "No published executable found to sign." }

          # Locate signtool from the Windows SDK
          $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\signtool.exe" -ErrorAction SilentlyContinue |
            Sort-Object FullName -Descending | Select-Object -First 1
          if (-not $signtool) { throw "signtool.exe not found on the runner." }

          # Decode PFX certificate
          $pfx = Join-Path $env:RUNNER_TEMP "codesign.pfx"
          [IO.File]::WriteAllBytes($pfx, [Convert]::FromBase64String($env:CODE_SIGN_PFX_BASE64))

          try {
            & $signtool.FullName sign /fd SHA256 /f $pfx /p $env:CODE_SIGN_PASSWORD `
              /tr $env:TIMESTAMP_URL /td SHA256 "$exe"
            if ($LASTEXITCODE -ne 0) { throw "signtool sign failed (exit $LASTEXITCODE)." }
          }
          finally {
            Remove-Item $pfx -Force -ErrorAction SilentlyContinue
          }

          # Post-sign verification check
          $sig = Get-AuthenticodeSignature "$exe"
          Write-Host "Signature status: $($sig.Status)"
          if ($sig.Status -ne 'Valid') { throw "Post-sign verification failed: $($sig.Status)" }

      - name: Compress Target Archive
        shell: pwsh
        run: |
          # This compression step is what turns the 23.7MB file into your ~6MB download package
          Compress-Archive -Path ./publish/* -DestinationPath ./WinWidgetBattery.zip

      - name: Upload Workflow Artifact (30-day retention)
        uses: actions/upload-artifact@v4
        with:
          name: WinWidgetBattery-CI-Build
          path: WinWidgetBattery.zip
          retention-days: 30

      - name: Create GitHub Release and Attach Zip
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            ## WinWidgetBattery ${{ github.ref_name }}
            
            Lightweight standalone Windows x64 single-file build.
            
            *Requires the .NET 10 Desktop Runtime installed on the host environment.*
          draft: false
          prerelease: false
          files: WinWidgetBattery.zip
          